<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" th:fragment="layout(title, content)">
<head th:replace="~{fragment/frag :: head_dashboard}">
</head>
<body>
<div class="container-fluid position-relative d-flex p-0">
    <div th:replace="~{fragment/frag :: sidebar_dashboard}"></div>

    <!-- Content -->
    <div class="content">

        <div th:replace="~{fragment/frag :: navbar_dashboard}"></div>

        <!-- Content slot - SAFE -->
        <div th:if="${content != null}">
            <th:block th:replace="${content}"></th:block>
        </div>

        <!-- Detail Section -->
        <div class="container-fluid pt-4 px-4">
            <div class="bg-secondary rounded p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h6 class="mb-0">Voucher Details</h6>
                    <a href="/vouchers" class="btn btn-light btn-compact">
                        <i class="fa fa-arrow-left me-1 "></i> Back
                    </a>
                </div>

                <!-- Form CODE -->
                <div class="row g-3" th:object="${voucher}">
                    <div class="col-md-3">
                        <label class="text-white-50">ID</label>
                        <div class="fw-semibold" th:text="*{voucherId}"></div>
                    </div>

                    <div class="col-md-3">
                        <label class="text-white-50">Name</label>
                        <div class="fw-semibold" th:text="*{voucherName}">Caramel Popcorn</div>
                    </div>

                    <div class="col-md-3">
                        <label class="text-white-50">Code</label>
                        <div class="fw-semibold" th:text="*{code}">Caramel Popcorn</div>
                    </div>

                    <div class="col-md-3">
                        <label class="text-white-50">Discount type</label>
                        <div class="fw-semibold"
                             th:text="*{discountType}"></div>
                    </div>
                    <div class="col-md-3">
                        <label class="text-white-50">Voucher value</label>
                        <div class="fw-semibold"
                             th:text="${voucher.discountType.equalsIgnoreCase('amount') ? #numbers.formatDecimal(voucher.discountValue, 0, 'COMMA', 0, 'POINT') + ' VNĐ' : voucher.discountValue + '%'}"></div>
                    </div>
                    <div class="col-md-3">
                        <label class="text-white-50">Usage Limit</label>
                        <div class="fw-semibold"
                             th:text="*{usageLimit}"></div>
                    </div>
                    <div class="col-md-3">
                        <label class="text-white-50">Used Count</label>
                        <div class="fw-semibold"
                             th:text="*{usedCount}"></div>
                    </div>
                    <div class="col-md-3">
                        <label class="text-white-50">Status</label>
                        <div class="fw-semibold"
                             th:text="${voucher.status ? 'Active' : 'Inactive'}"></div>
                    </div>

                    <a class="btn btn-sm btn-success"
                       th:href="@{/vouchers/update/{id}(id=${voucher.getVoucherId()})}">
                        <i class="fa fa-edit"></i> Edit
                    </a>
                    <button class="btn btn-sm btn-danger"
                            th:attr="data-id=${voucher.getVoucherId()}, data-name=${voucher.getVoucherName()}"
                            onclick="openDeleteModal(this.dataset.id, this.dataset.name)">
                        <i class="fa fa-trash"></i> Delete
                    </button>
                </div>
            </div>
        </div>




        <!-- Script -->
        <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="/assets/js/main.js"></script>
        <script src="/assets/js/dashboard.js"></script>
    </div>

    <!--Delete voucher modal-->
    <div class="modal fade" id="deleteVoucherModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-secondary text-white">
                <div class="modal-header">
                    <h5 class="modal-title">Delete Voucher</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to delete the voucher <strong class="text-danger" id="deleteVoucherCode"></strong> (ID: <span
                            id="deleteVoucherIdDisplay"></span>)?</p>
                    <p class="text-warning small">**(Warning: Deleting a voucher that has been used may affect
                        historical
                        booking data).**</p>
                </div>
                <input type="hidden" id="deleteVoucherId" />
                <div class="modal-footer">
                    <button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-danger" id="confirmDeleteVoucherBtn">Delete</button>
                </div>
            </div>
        </div>
    </div>
